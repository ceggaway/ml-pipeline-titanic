name: CI — Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Train model (generates artefacts required by integration tests)
        run: python -m src.pipeline.pipeline --config config/config.yaml --data data/raw/train.csv

      - name: Run tests with coverage
        run: pytest tests/ -v --cov=src --cov-report=term-missing
