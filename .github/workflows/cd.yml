name: CD — Pipeline Verification

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v

      - name: Train model end-to-end
        run: python src/pipeline/pipeline.py --config config/config.yaml --data data/raw/train.csv

      - name: Run batch prediction
        run: python src/pipeline/pipeline.py --predict --input data/raw/test.csv --output models/batch_outputs/predictions_ci.csv

      - name: Verify output exists and has rows
        run: |
          test -f models/batch_outputs/predictions_ci.csv
          ROWS=$(tail -n +2 models/batch_outputs/predictions_ci.csv | wc -l)
          echo "Prediction rows: $ROWS"
          test "$ROWS" -gt 0
