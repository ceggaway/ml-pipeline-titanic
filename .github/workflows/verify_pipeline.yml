name: Verify Pipeline — End-to-End Smoke Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        run: pytest tests/ -v --cov=src --cov-report=term-missing

      - name: Train model end-to-end
        run: python -m src.pipeline.pipeline --config config/config.yaml --data data/raw/train.csv

      - name: Verify model artefact exists
        run: test -f models/final_model.joblib

      - name: Generate synthetic input data
        run: python scripts/generate_sample_data.py --rows 50

      - name: Run batch prediction
        run: python -m src.pipeline.pipeline --predict --input data/raw/daily_input.csv --output models/batch_outputs/predictions_ci.csv

      - name: Verify output schema and content
        run: |
          python - <<'EOF'
          import pandas as pd, sys
          df = pd.read_csv("models/batch_outputs/predictions_ci.csv")
          required = {"PassengerId", "prediction", "probability", "survived_label"}
          missing  = required - set(df.columns)
          if missing:
              print(f"Missing columns: {missing}")
              sys.exit(1)
          if len(df) == 0:
              print("Output has no rows")
              sys.exit(1)
          if not df["prediction"].isin([0, 1]).all():
              print("Predictions contain values other than 0 or 1")
              sys.exit(1)
          print(f"Schema OK — {len(df)} rows, columns: {list(df.columns)}")
          EOF
