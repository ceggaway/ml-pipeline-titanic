features:
  numeric:
    - Age
    - Fare
    - FamilySize
    - LogFare
    - Pclass_x_Fare
    - FarePerPerson
  categorical:
    - Sex
    - Embarked
    - Name_title
    - Cabin_deck
    - AgeGroup
  engineered:
    - FamilySize       # SibSp + Parch + 1
    - IsAlone          # 1 if FamilySize == 1
    - LogFare          # log1p(Fare) — handles right skew
    - AgeGroup         # Child (<16) / Adult (16-60) / Senior (>60)
    - Pclass_x_Fare    # Pclass * Fare interaction
    - FarePerPerson    # Fare / FamilySize — normalises shared-ticket fares
  title_mapping:
    Mlle: Miss
    Mme: Mrs
    Ms: Miss
  title_keep:
    - Mr
    - Mrs
    - Miss
    - Master
  title_rare_label: Rare
  age_bins: [0, 16, 60, .inf]
  age_labels: [Child, Adult, Senior]
  drop:
    - Name
    - Ticket
    - Cabin
    - PassengerId
    - SibSp          # replaced by FamilySize
    - Parch          # replaced by FamilySize

preprocessing:
  impute:
    Age: median
    Embarked: mode
    Cabin_deck: Unknown
  scale:
    - Age
    - Fare
    - FamilySize
    - LogFare
    - Pclass_x_Fare
    - FarePerPerson
  encode:
    - Sex
    - Embarked
    - Name_title
    - Cabin_deck
    - AgeGroup

imbalance:
  method: RandomUnderSampler
  random_state: 42

model:
  type: CatBoostClassifier
  params:
    random_state: 42
    verbose: 0
  threshold: 0.46

training:
  test_size: 0.2
  cv_folds: 5
  scoring: roc_auc
  target: Survived

evaluation:
  metrics:
    - roc_auc
    - f1
    - recall
    - precision
    - accuracy
  positive_class: 1   # Survived

# ── Experiment lineage — decisions and outcomes ──────────────────────────────
# exp_001: Baseline RF                → CV AUC 0.8741 | Recall 0.68 | identified class imbalance as main weakness
# exp_002: Imbalance handling         → RandomUnderSampler chosen | Recall improved to 0.77
# exp_003: Feature engineering        → added LogFare, AgeGroup, FamilySize, IsAlone, Pclass×Fare, FarePerPerson | F1 0.73, Recall 0.81
# exp_004: Model selection            → CatBoost wins | CV AUC 0.8909, F1 0.783 | ensembling ruled out (71.8% error overlap)
# exp_005: Hyperparameter tuning      → defaults near-optimal; tuning degraded results; kept defaults
# exp_006: Model finalisation         → 17 features (dropped 8 near-zero importance) | threshold 0.46 (vs 0.5) | no calibration needed
#                                        Final: CV AUC 0.8966, Hold-out Recall 0.841, F1 0.784
